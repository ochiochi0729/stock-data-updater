name: Test Walk-Forward (時系列シミュレーション)

on:
  workflow_dispatch: # 手動実行ボタンのみ

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ① 準備（必要な道具をロボットに持たせる）
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance pandas-gbq db-dtypes google-auth pyarrow google-cloud-bigquery-storage requests

      - name: ② シミュレーションの実行と結果表示
        env: # ★ここを追加！GitHubの金庫から合鍵を取り出して渡す
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python walk_forward_test.py
