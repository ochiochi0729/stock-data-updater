name: Daily Stock Data Update

on:
  schedule:
    # 毎日 UTCの午前9時（日本時間の夕方18時）に実行する設定
    - cron: '0 9 * * *'
  # 手動で実行ボタンを押せるようにする設定
  workflow_dispatch:

jobs:
  run-update:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v3

      - name: Pythonをセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 必要なライブラリをインストール
        run: |
          pip install pandas yfinance pandas-gbq db-dtypes google-auth

      - name: 株価取得プログラムを実行
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python -u update_stocks.py  # ★ -u を追加するだけです！

      # ▼▼▼ここから下を一番最後に追記します▼▼▼
      - name: 完了通知をGmailに送信
        uses: dawidd6/action-send-mail@v3
        if: always()  # 成功してもエラーが起きても必ず実行する魔法の言葉
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: 【自動化】株価データの更新完了 (${{ job.status }})
          body: |
            GitHub Actionsでの株価データ取得・BigQuery更新プログラムが完了しました。
            
            実行結果: ${{ job.status }}
            
            ※ログの詳細はGitHubリポジトリのActionsタブから確認してください。
          to: ochiochi0729@gmail.com
          from: GitHub Actions Bot
