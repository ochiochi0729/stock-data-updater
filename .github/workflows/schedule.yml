name: Daily Stock Data Update

on:
  schedule:
    # 毎日 UTCの午前9時（日本時間の夕方18時）に実行する設定
    - cron: '0 9 * * *'
  # 手動で実行ボタンを押せるようにする設定
  workflow_dispatch:

jobs:
  run-update:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v3

      - name: Pythonをセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 必要なライブラリをインストール
        run: |
          pip install pandas yfinance google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: 株価取得プログラムを実行
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python -u update_stocks.py  # ★ -u を追加するだけです！
