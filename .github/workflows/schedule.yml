name: Daily Stock Data Update & Screening

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v3

      - name: Pythonをセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance pandas-gbq db-dtypes google-auth pyarrow google-cloud-bigquery-storage

      - name: ① 株価取得プログラムを実行（BigQueryへ保存）
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python -u update_stocks.py

      - name: ② スクリーニングプログラムを実行
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python -u run_screener.py

      - name: ③ レポートを合体させてメール本文を作る
        if: always()
        run: |
          echo "REPORT_CONTENT<<EOF" >> $GITHUB_ENV
          
          # 1. データ更新のレポートを差し込む
          if [ -f update_report.txt ]; then
            cat update_report.txt >> $GITHUB_ENV
          else
            echo "データ更新のログがありません。" >> $GITHUB_ENV
          fi
          
          echo "" >> $GITHUB_ENV
          
          # 2. スクリーニング結果のレポートを差し込む
          if [ -f report.txt ]; then
            cat report.txt >> $GITHUB_ENV
          else
            echo "スクリーニング結果のログがありません。" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: ④ 抽出結果をGmailに送信
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: 【本日の抽出結果】統合スクリーニング (${{ job.status }})
          body: |
            本日のシステム稼働レポートです。

            ${{ env.REPORT_CONTENT }}
          to: yourname@gmail.com  # ★ご自身のメールアドレスのままでOKです
          from: GitHub Actions Bot
