name: 2. Stock Screening

on:
  workflow_run:
    workflows: ["1. Daily Stock Data Update"] # ファイル1の名前と完全に一致させる
    types:
      - completed
  workflow_dispatch: # ★これがあるため、GitHub画面からいつでも単独テスト可能！

jobs:
  run-screening:
    runs-on: ubuntu-latest
    # ★重要: 前のジョブが「成功」した時か、または「手動実行」の時だけ動かす
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install pandas pandas-gbq db-dtypes google-auth pyarrow google-cloud-bigquery-storage

      - name: スクリーニングを実行
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python -u run_screener.py

      - name: レポート本文を作る
        if: always()
        run: |
          echo "REPORT_CONTENT<<EOF" >> $GITHUB_ENV
          if [ -f report.txt ]; then
            cat report.txt >> $GITHUB_ENV
          else
            echo "スクリーニング結果のログがありません。" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: 抽出結果をGmailに送信
        uses: dawidd6/action-send-mail@v4
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: 【本日の抽出結果】スクリーニング (${{ job.status }})
          body: |
            スクリーニングの実行レポートです。
            
            ${{ env.REPORT_CONTENT }}
          to: ochiochi0729@gmail.com
          from: GitHub Actions Bot
