name: 1. Daily Stock Data Update

on:
  schedule:
    - cron: '13 9 * * 2-6' # 日本時間の火〜土 18:30
  workflow_dispatch: # 手動実行も可能

jobs:
  run-update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance pandas-gbq db-dtypes google-auth pyarrow google-cloud-bigquery-storage

      - name: 株価データの更新（BigQueryへ）を実行
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python -u update_stocks.py

      - name: レポート本文を作る
        if: always()
        run: |
          echo "REPORT_CONTENT<<EOF" >> $GITHUB_ENV
          if [ -f update_report.txt ]; then
            cat update_report.txt >> $GITHUB_ENV
          else
            echo "データ更新のログがありません。" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: 更新結果をGmailに送信
        uses: dawidd6/action-send-mail@v4
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: 【DB更新完了】株価データ更新 (${{ job.status }})
          body: |
            本日の株価データ更新レポートです。
            
            ${{ env.REPORT_CONTENT }}
          to: ochiochi0729@gmail.com
          from: GitHub Actions Bot
