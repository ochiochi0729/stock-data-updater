name: Test Walk-Forward (時系列シミュレーション)

on:
  workflow_dispatch: # 手動実行ボタンのみ

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ① 準備（必要な道具をロボットに持たせる）
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance pandas-gbq db-dtypes google-auth pyarrow google-cloud-bigquery-storage requests matplotlib

      - name: ② シミュレーションの実行と結果表示
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python walk_forward_test.py

      - name: ③ グラフ画像を保存する
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            equity_curve.png
            walk_forward_report.txt
